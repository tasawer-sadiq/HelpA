<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpA Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings">
      <div class="settings__hero">
        <p class="settings__eyebrow">HelpA</p>
        <h1 class="settings__title">DuckDuckGo setup</h1>
        <p class="settings__copy">
          HelpA now uses DuckDuckGo instant answers for free, so there is no API key to add.
        </p>
      </div>

      <section class="settings__card">
        <p class="settings__hint">
          Reload the extension in Chrome, then use HelpA right away. If DuckDuckGo does not have an instant answer for a query, HelpA will still let you open the full Google search.
        </p>

        <p id="settings-status" class="settings__status">Ready.</p>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
  </html>
